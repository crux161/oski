name: CI

on:
  pull_request:
    branches:
      - 'master'

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubicloud-standard-30
            target: ffmpeg-bin
          - runs_on: ubicloud-standard-30
            target: ffmpeg-dev
          - runs_on: ubicloud-standard-30
            target: ffmpeg-shared
          - runs_on: ubicloud-standard-30-arm
            target: ffmpeg-bin
          - runs_on: ubicloud-standard-30-arm
            target: ffmpeg-dev
          - runs_on: ubicloud-standard-30-arm
            target: ffmpeg-shared
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: false
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.runs_on }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}-${{ matrix.runs_on }}
